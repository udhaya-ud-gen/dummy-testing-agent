# NOTE: this file is generated in dummy-testing-agent for review. It is
# meant to be copied manually into udhaya-ud-gen/dummy-app's own repo at
# .github/workflows/test-on-push.yml -- it is NOT active here.
#
# On every push, this workflow starts the dummy-app dev server, runs the
# Playwright suite from dummy-testing-agent against it, and (via
# run_pipeline.py) files a GitHub issue + "Testing log" project entry for
# each failing test.

name: Test on push

on:
  push:
    branches:
      - '**'

# contents: write -- the analysis script pushes screenshot evidence commits.
# issues: write   -- the analysis script creates GitHub issues for failures.
permissions:
  contents: write
  issues: write

# ============================================================================
# CONFIGURE THESE FOR YOUR APP -- this is the only section that should need
# to change when reusing this workflow for a different project. Everything
# below this block reads from these values instead of being hardcoded.
# ============================================================================
env:
  APP_START_COMMAND: "npm run dev"     # how your app's dev server is started
  APP_PORT: "5173"                     # port it listens on (Vite default shown)
  TEST_DIR: "projects/dummy-app/tests" # this app's own Playwright tests folder
  ISSUE_OWNER: "udhaya-ud-gen"         # GitHub user/org the issue repo lives under
  ISSUE_REPO: "dummy-app"              # repo failures get filed as Issues in
  PROJECT_OWNER: "udhaya-ud-gen"       # user/org that owns the GitHub Project (board)
  PROJECT_NUMBER: "1"                  # the Project's number (from its URL)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Default checkout: pulls the dummy-app repo this workflow lives in,
      # into the workspace root.
      - name: Checkout dummy-app
        uses: actions/checkout@v4

      # Pull the testing agent (Playwright suite + analysis scripts) into a
      # subfolder alongside the app checkout. Needs GH_PAT since this is a
      # separate repo from the one the workflow runs in.
      - name: Checkout dummy-testing-agent
        uses: actions/checkout@v4
        with:
          repository: udhaya-ud-gen/dummy-testing-agent
          token: ${{ secrets.GH_PAT }}
          path: testing-agent

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- Start the dummy-app dev server (workspace root checkout) -------
      - name: Install dummy-app dependencies
        run: npm install

      - name: Start dummy-app dev server
        # nohup + disown + redirect-to-file makes the server survive past
        # this step's shell exiting. A plain "npm run dev &" can get its
        # process group cleaned up by the runner once this step finishes,
        # which is why the readiness check below can pass once and the
        # actual test run can still hit ERR_CONNECTION_REFUSED later.
        run: |
          nohup ${{ env.APP_START_COMMAND }} > /tmp/dummy-app-dev.log 2>&1 &
          disown

      - name: Wait for dummy-app to be reachable
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:${{ env.APP_PORT }} > /dev/null; then
              echo "dummy-app is up (attempt $i)"
              exit 0
            fi
            echo "Waiting for dummy-app to start... ($i/30)"
            sleep 2
          done
          echo "dummy-app did not become reachable in time" >&2
          echo "--- dev server log ---" >&2
          cat /tmp/dummy-app-dev.log >&2 || true
          exit 1

      # --- Run the Playwright suite + failure analysis (testing-agent) ----
      - name: Install testing-agent Node dependencies
        working-directory: testing-agent
        run: npm install

      - name: Install Playwright browsers
        working-directory: testing-agent
        run: npx playwright install --with-deps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: testing-agent
        run: pip install requests

      # Must run before "Run tests and log failures" -- that step's
      # run_pipeline.py does `git commit` to push screenshot evidence, and
      # a fresh runner has no configured git identity by default.
      - name: Configure git identity
        working-directory: testing-agent
        run: |
          git config --global user.email "agent@dummy-testing.local"
          git config --global user.name "Testing Agent Bot"

      - name: Verify dummy-app is still reachable before testing
        # Cheap sanity check right before the suite runs, so if the server
        # died between the readiness check and here, the log makes that
        # obvious instead of surfacing as 12 generic connection-refused
        # test failures.
        run: |
          if ! curl -s http://localhost:${{ env.APP_PORT }} > /dev/null; then
            echo "dummy-app is no longer reachable right before testing" >&2
            cat /tmp/dummy-app-dev.log >&2 || true
            exit 1
          fi
          echo "dummy-app still up, proceeding to tests"

      - name: Run tests and log failures
        working-directory: testing-agent
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python agent/run_pipeline.py